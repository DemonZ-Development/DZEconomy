# ╔══════════════════════════════════════════════════════════════╗
# ║                 GLOBAL REWARD MULTIPLIERS                   ║
# ╚══════════════════════════════════════════════════════════════╝
# These multipliers are applied to ALL mob rewards after
# rank multipliers. They stack on top of rank bonuses.
#
# ┌────────────────────────────────────────────────────────────┐
# │  Stacking order:                                           │
# │  Base Reward × Rank Multiplier × Global Multiplier         │
# └────────────────────────────────────────────────────────────┘

global-multipliers:
  mobcoin: 1.0
  money: 1.0
  gem: 1.0

# ╔══════════════════════════════════════════════════════════════╗
# ║                  KILL STREAK BONUSES                        ║
# ╚══════════════════════════════════════════════════════════════╝
# Bonus multipliers applied when a player kills multiple mobs
# within a short time window. This encourages active gameplay
# and rewards skilled players.
#
# ┌────────────────────────────────────────────────────────────┐
# │  kills   – Number of kills within the window to trigger.   │
# │  multiplier – Reward multiplier for that streak tier.      │
# │  message – Message shown when the streak is reached.       │
# │            Placeholders: {kills}, {multiplier}             │
# └────────────────────────────────────────────────────────────┘

kill-streaks:
  # Whether kill streak bonuses are enabled.
  enabled: true
  # Time window (in seconds) between kills to count as a streak.
  window: 10
  # Streak tiers (evaluated from top to bottom; first match wins).
  tiers:
    10:
      multiplier: 2.0
      message: "&6* Kill Streak x{kills}! &7(2x rewards for {kills} kills!)"
    5:
      multiplier: 1.5
      message: "&e* Kill Streak x{kills}! &7(1.5x rewards!)"
    3:
      multiplier: 1.25
      message: "&a* Kill Streak x{kills}! &7(1.25x rewards!)"

# ╔══════════════════════════════════════════════════════════════╗
# ║                 SPECIAL EVENT BONUSES                       ║
# ╚══════════════════════════════════════════════════════════════╝
# Time-based multipliers that activate during specific periods.
# These can be used for double-reward weekends, holiday events, etc.
# The plugin checks these on each mob kill and applies the
# highest matching event multiplier.

events:
  # Whether event-based multipliers are enabled.
  enabled: false

  # ── Weekend Bonus ───────────────────────────────────────────
  # Double rewards on Saturdays and Sundays.
  weekend:
    enabled: false
    # Days of the week (MONDAY, TUESDAY, ..., SUNDAY).
    days:
      - SATURDAY
      - SUNDAY
    multiplier: 2.0
    # Start time (24h format, server timezone). Empty = all day.
    start-time: ""
    # End time (24h format, server timezone). Empty = all day.
    end-time: ""

  # ── Night Bonus ─────────────────────────────────────────────
  # Extra rewards during nighttime (in-game time).
  night:
    enabled: false
    # Multiplier applied during night.
    multiplier: 1.5
    # In-game tick range for "night".
    # Minecraft night: 13000 – 23000 ticks.
    start-tick: 13000
    end-tick: 23000

  # ── Custom Events ───────────────────────────────────────────
  # Add your own timed events below. These can be activated
  # manually via /economy event start <name> or scheduled.
  #
  # custom-events:
  #   halloween:
  #     multiplier: 3.0
  #     currency: mobcoin
  #     message: "&6Halloween Special! &73x MobCoin rewards!"
  #   christmas:
  #     multiplier: 2.5
  #     currency: money
  #     message: "&cChristmas Bonus! &72.5x Money rewards!"
