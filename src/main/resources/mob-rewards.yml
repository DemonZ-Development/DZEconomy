# ╔══════════════════════════════════════════════════════════════╗
# ║                    DZEconomy v2.1.1                        ║
# ║                 Mob Rewards Configuration                  ║
# ║                                                            ║
# ║   Wiki: https://wiki.demonzdevelopment.online/dzeconomy/mob-rewards     ║
# ║   Support: https://discord.com/invite/GYsTt96ypf                      ║
# ╚══════════════════════════════════════════════════════════════╝
#
# ┌──────────────────────────────────────────────────────────────┐
# │  Configure rewards for killing mobs. Rewards are given in   │
# │  MobCoins by default, but you can also award Money or Gems. │
# │                                                              │
# │  Mob Reward Properties:                                      │
# │    mobcoin        – MobCoins awarded (0 = none).            │
# │    money          – Money awarded (0 = none).               │
# │    gem            – Gems awarded (0 = none).                │
# │    chance         – Drop chance (0.0 – 1.0).               │
# │                     1.0 = always drops, 0.5 = 50% chance.  │
# │    min-amount     – Minimum reward (for random range).      │
# │                     If omitted, the flat amount is used.    │
# │    max-amount     – Maximum reward (for random range).      │
# │                     If omitted, the flat amount is used.    │
# │    message        – Custom reward message override.         │
# │                     Leave empty for default message.        │
# │                     Placeholders: {amount}, {currency},     │
# │                     {mob}                                   │
# │                                                              │
# │  Categories:                                                 │
# │    neutral  – Passive mobs (cows, sheep, pigs, etc.)       │
# │    easy     – Easy hostile mobs (zombies, skeletons, etc.)  │
# │    hard     – Hard hostile mobs (creepers, blazes, etc.)    │
# │    boss     – Boss mobs (ender dragon, wither, etc.)        │
# │    custom   – Custom mob entries (mythic mobs, etc.)        │
# │                                                              │
# │  Global settings for mob rewards are in config.yml under    │
# │  the mob-rewards section.                                   │
# └──────────────────────────────────────────────────────────────┘

# ╔══════════════════════════════════════════════════════════════╗
# ║                NEUTRAL MOBS                                 ║
# ╚══════════════════════════════════════════════════════════════╝
