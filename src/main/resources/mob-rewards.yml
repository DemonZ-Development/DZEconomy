# ╔══════════════════════════════════════════════════════════════╗
# ║                     BOSS MOBS                               ║
# ╚══════════════════════════════════════════════════════════════╝
# End-game boss mobs. These should have very high rewards since
# they require significant preparation and skill to defeat.
# Gems are included as rare rewards for boss kills.

boss:
  # ── Ender Dragon ────────────────────────────────────────────
  # The original boss. First-kill rewards are usually higher
  # because there's only one dragon per end cycle.
  ENDER_DRAGON:
    mobcoin:
      min-amount: 50
      max-amount: 100
    money:
      min-amount: 100.0
      max-amount: 250.0
    gem:
      min-amount: 5
      max-amount: 10
    chance: 1.0
    message: "&6+{amount} {currency} &7(Ender Dragon defeated!)"

  # ── Wither ──────────────────────────────────────────────────
  WITHER:
    mobcoin:
      min-amount: 30
      max-amount: 75
    money:
      min-amount: 75.0
      max-amount: 150.0
    gem:
      min-amount: 3
      max-amount: 7
    chance: 1.0
    message: "&6+{amount} {currency} &7(Wither destroyed!)"

  # ── Wither Storm ────────────────────────────────────────────
  # (For servers using custom Wither Storm plugins/mythic mobs)
  WITHER_STORM:
    mobcoin:
      min-amount: 100
      max-amount: 250
    money:
      min-amount: 250.0
      max-amount: 500.0
    gem:
      min-amount: 10
      max-amount: 25
    chance: 1.0
    message: "&d+{amount} {currency} &7(⚡ Legendary Wither Storm defeated!)"

