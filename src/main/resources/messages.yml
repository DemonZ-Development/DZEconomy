# ╔══════════════════════════════════════════════════════════════╗
# ║                    DZEconomy v2.0.0                        ║
# ║              Messages & Language Configuration              ║
# ║                                                            ║
# ║   Wiki: https://wiki.demonzdevelopment.online/dzeconomy                 ║
# ║   Support: https://discord.com/invite/GYsTt96ypf                      ║
# ╚══════════════════════════════════════════════════════════════╝
#
# ┌──────────────────────────────────────────────────────────────┐
# │  Color Codes:                                               │
# │    &0 Black    &1 Dark Blue   &2 Dark Green  &3 Dark Aqua   │
# │    &4 Dark Red &5 Purple      &6 Gold        &7 Gray        │
# │    &8 Dark Gray&9 Blue        &a Green       &b Aqua        │
# │    &c Red      &d Light Purple&e Yellow      &f White       │
# │                                                              │
# │  Formatting:                                                 │
# │    &k Obfuscated  &l Bold  &m Strikethrough                 │
# │    &n Underline   &o Italic  &r Reset                        │
# │                                                              │
# │  Hex Colors (1.16+): &#RRGGBB                               │
# │  Gradient (MiniMessage): <gradient:#ff0000:#0000ff>text</>  │
# │                                                              │
# │  Placeholders are enclosed in {curly braces}.               │
# │  Do NOT remove placeholders unless you want them unused.    │
# └──────────────────────────────────────────────────────────────┘

# ── Global Prefix ──────────────────────────────────────────────
# Applied before every message (unless the message starts with
# "noprefix:" which strips the prefix).
prefix: "&8[&6DZEconomy&8] &r"

# ╔══════════════════════════════════════════════════════════════╗
# ║                   BALANCE MESSAGES                          ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {amount}    – Formatted balance amount
#   {currency}  – Currency display name (plural)
#   {symbol}    – Currency symbol
#   {name}      – Target player's name (for others)

balance:
  # Shown when a player checks their own balance.
  self: "&aYour {currency} balance&7: &e{symbol}{amount}"
  # Shown when checking another player's balance.
  others: "&a{name}'s {currency} balance&7: &e{symbol}{amount}"
  # Shown when a disabled currency's balance is checked.
  currency-disabled: "&cThe {currency} currency is currently disabled."

# ╔══════════════════════════════════════════════════════════════╗
# ║                  SEND / RECEIVE MESSAGES                    ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {amount}    – Transaction amount
#   {currency}  – Currency display name
#   {symbol}    – Currency symbol
#   {sender}    – Sender's name
#   {receiver}  – Receiver's name
#   {balance}   – Player's new balance after transaction

send:
  # Shown to the sender after a successful transfer.
  sender: "&aYou sent &e{symbol}{amount} {currency} &ato &f{receiver}&7. &8(New balance: {symbol}{balance})"
  # Shown to the receiver when they receive currency.
  receiver: "&aYou received &e{symbol}{amount} {currency} &afrom &f{sender}&7. &8(New balance: {symbol}{balance})"
  # Confirmation message (if confirmation mode is enabled).
  confirm: "&eType &a/{command} send {receiver} {amount} &eagain within 10 seconds to confirm."

# ╔══════════════════════════════════════════════════════════════╗
# ║                 REQUEST MESSAGES                            ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {amount}    – Requested amount
#   {currency}  – Currency display name
#   {symbol}    – Currency symbol
#   {sender}    – Requester's name
#   {target}    – Target's name
#   {timeout}   – Request timeout in seconds
#   {id}        – Unique request ID

request:
  # Shown to the sender when a request is sent.
  sent: "&aRequest sent to &f{target} &afor &e{symbol}{amount} {currency}&7. &8(Expires in {timeout}s)"
  # Shown to the target when they receive a request.
  received: "&f{sender} &ais requesting &e{symbol}{amount} {currency}&a. &7Use &a/{command} accept {id} &7or &c/{command} deny {id}"
  # Shown to the sender when their request is accepted.
  accepted-sender: "&a{target} &aaccepted your request for &e{symbol}{amount} {currency}&7."
  # Shown to the target when they accept a request.
  accepted-target: "&aYou accepted &f{sender}'s &arequest for &e{symbol}{amount} {currency}&7."
  # Shown to the sender when their request is denied.
  denied-sender: "&c{target} &cdenied your request for &e{symbol}{amount} {currency}&7."
  # Shown to the target when they deny a request.
  denied-target: "&cYou denied &f{sender}'s &crequest for &e{symbol}{amount} {currency}&7."
  # Shown when a request expires.
  expired: "&cYour request for &e{symbol}{amount} {currency} &cto &f{target} &chas expired."
  # Shown when the target sees an expired request.
  expired-target: "&cThe request from &f{sender} &chas expired."
  # Shown when a player has too many pending requests.
  max-pending: "&cYou have too many pending requests! Wait for some to expire or be resolved."
  # Shown when trying to accept/deny a request that doesn't exist or has expired.
  not-found: "&cRequest not found. It may have expired or been resolved."
  # Shown when trying to accept your own request.
  cannot-accept-own: "&cYou cannot accept your own request!"
  # Shown when a request is cancelled because a player quit.
  cancelled-quit: "&cThe payment request involving &f{player} &chas been cancelled because they disconnected."

# ╔══════════════════════════════════════════════════════════════╗
# ║                  ADMIN MESSAGES                             ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {amount}    – Amount involved
#   {currency}  – Currency display name
#   {symbol}    – Currency symbol
#   {name}      – Target player's name
#   {balance}   – Player's new balance after operation

admin:
  add:
    # Shown to the admin when they add currency.
    sender: "&aAdded &e{symbol}{amount} {currency} &ato &f{name}'s &abalance."
    # Shown to the player who received currency.
    target: "&aAn admin added &e{symbol}{amount} {currency} &ato your balance. &8(New balance: {symbol}{balance})"
  remove:
    # Shown to the admin when they remove currency.
    sender: "&cRemoved &e{symbol}{amount} {currency} &cfrom &f{name}'s &cbalance."
    # Shown to the player who lost currency.
    target: "&cAn admin removed &e{symbol}{amount} {currency} &cfrom your balance. &8(New balance: {symbol}{balance})"
  set:
    # Shown to the admin when they set a player's balance.
    sender: "&aSet &f{name}'s &a{currency} balance to &e{symbol}{amount}&7."
    # Shown to the player whose balance was set.
    target: "&aAn admin set your {currency} balance to &e{symbol}{amount}&7."

# ╔══════════════════════════════════════════════════════════════╗
# ║                   ERROR MESSAGES                            ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {amount}       – The invalid/insufficient amount
#   {currency}     – Currency display name
#   {symbol}       – Currency symbol
#   {name}         – Target player's name
#   {cooldown}     – Remaining cooldown time
#   {limit}        – The daily limit
#   {remaining}    – Remaining daily allowance
#   {min}          – Minimum transaction amount
#   {max}          – Maximum transaction amount
#   {time}         – Combat tag remaining time
#   {permission}   – Required permission node

error:
  # General no-permission message.
  no-permission: "&cYou don't have permission to do that! &7({permission})"
  # Player not found in the database.
  player-not-found: "&cPlayer &f{name} &cnot found. Have they joined the server before?"
  # Sender has insufficient funds.
  insufficient-funds: "&cYou don't have enough {currency}! &7(Balance: {symbol}{amount})"
  # Invalid amount (negative, zero, or non-numeric).
  invalid-amount: "&cInvalid amount! Must be a positive number."
  # Amount below minimum transaction threshold.
  below-minimum: "&cAmount must be at least &e{symbol}{min} {currency}&c."
  # Amount exceeds maximum transaction limit.
  above-maximum: "&cAmount exceeds the maximum transaction limit of &e{symbol}{max} {currency}&c."
  # Daily transfer limit reached.
  daily-limit-reached: "&cYou've reached your daily {currency} transfer limit! &7(Limit: {symbol}{limit}, Remaining: {symbol}{remaining})"
  # Transfer cooldown active.
  cooldown: "&cPlease wait &e{cooldown}s &cbefore transferring {currency} again."
  # Player is combat tagged.
  combat-tagged: "&cYou can't do that while combat-tagged! &7({time}s remaining)"
  # Self-transfer attempt.
  cannot-send-self: "&cYou can't send {currency} to yourself!"
  # Currency is disabled.
  currency-disabled: "&cThe {currency} currency is currently disabled."
  # Console cannot use this command.
  console-only-player: "&cThis command can only be used by players."
  # Command usage error.
  usage: "&cUsage: {usage}"
  # Unknown sub-command.
  unknown-subcommand: "&cUnknown sub-command. Use &e/{command} help &cfor a list of commands."

# ╔══════════════════════════════════════════════════════════════╗
# ║               ECONOMY COMMAND MESSAGES                      ║
# ╚══════════════════════════════════════════════════════════════╝

economy:
  # ── Reload ──────────────────────────────────────────────────
  reload:
    success: "&aConfiguration reloaded successfully!"
    failed: "&cFailed to reload configuration! Check the console for errors."

  # ── Version ─────────────────────────────────────────────────
  version: "&6DZEconomy &7v&e{version} &7by &6DemonZ Development"

  # ── Info ────────────────────────────────────────────────────
  # Placeholders: {version}, {storage}, {currencies}, {players}, {uptime}
  info:
    - "&8&m────────────────────────────────────"
    - "&6&l  DZEconomy &7v&e{version}"
    - "&8&m────────────────────────────────────"
    - "&7  Storage: &f{storage}"
    - "&7  Currencies: &f{currencies}"
    - "&7  Tracked Players: &f{players}"
    - "&7  Uptime: &f{uptime}"
    - "&8&m────────────────────────────────────"

  # ── Status ──────────────────────────────────────────────────
  # Placeholders: {storage}, {storage_latency}, {cache_size}, {auto_save}, {last_save}
  status:
    - "&8&m────────────────────────────────────"
    - "&6&l  Plugin Status"
    - "&8&m────────────────────────────────────"
    - "&7  Storage: &f{storage} &7(&a{storage_latency}ms&7)"
    - "&7  Cache Size: &f{cache_size} players"
    - "&7  Auto-Save: &f{auto_save}s"
    - "&7  Last Save: &f{last_save}"
    - "&8&m────────────────────────────────────"

  # ── Convert ─────────────────────────────────────────────────
  # Placeholders: {from_currency}, {to_currency}, {from_amount}, {to_amount}, {fee}, {rate}
  convert:
    success: "&aConverted &e{from_amount} {from_currency} &ato &e{to_amount} {to_currency}&7. &8(Fee: {fee}%)"
    insufficient: "&cYou don't have enough {from_currency} to convert!"
    disabled: "&cCurrency conversion is not enabled."
    same-currency: "&cYou can't convert {currency} to itself!"

  # ── Migrate ─────────────────────────────────────────────────
  # Placeholders: {from}, {to}, {count}
  migrate:
    start: "&eStarting migration from &f{from} &eto &f{to}&e..."
    success: "&aMigration complete! &7Migrated &f{count} &7player records."
    failed: "&cMigration failed! Check the console for details."
    in-progress: "&cA migration is already in progress! Please wait."
    same-backend: "&cYou're already using {backend} storage!"

  # ── Baltop (Admin) ──────────────────────────────────────────
  baltop:
    header: "&6&l  Global Balance Leaderboard"
    entry: "&e#{rank} &7- &f{name} &8» &a{total}"
    footer: "&7Page &f{page}&7/&f{pages}"

  # ── Payall ──────────────────────────────────────────────────
  # Placeholders: {amount}, {currency}, {symbol}, {count}
  payall:
    success: "&aPaid &e{symbol}{amount} {currency} &ato &f{count} &aplayers!"
    broadcast: "&aYou received &e{symbol}{amount} {currency} &afrom a server payout!"
    cooldown: "&cPayall is on cooldown! Please wait &e{time}s&c."
    no-players: "&cNo online players to pay!"

  # ── Credits ─────────────────────────────────────────────────
  credits:
    - "&8&m────────────────────────────────────"
    - "&6&l  DZEconomy Credits"
    - "&8&m────────────────────────────────────"
    - "&7  Developed by: &6DemonZ Development"
    - "&7  Version: &e{version}"
    - "&7  Wiki: &bhttps://wiki.demonzdevelopment.online/dzeconomy"
    - "&7  Discord: &bhttps://discord.com/invite/GYsTt96ypf"
    - "&7  Modrinth: &bhttps://modrinth.com/plugin/dzeconomy"
    - "&8&m────────────────────────────────────"

  # ── Backup ──────────────────────────────────────────────────
  # Placeholders: {file}
  backup:
    success: "&aBackup created successfully! &7({file})"
    failed: "&cBackup failed! Check the console for details."

# ╔══════════════════════════════════════════════════════════════╗
# ║                 COMBAT TAG MESSAGES                         ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {time}  – Remaining combat tag duration
#   {killer} – Name of the killer
#   {victim} – Name of the victim

combat-tag:
  # Shown when a player gets combat tagged.
  tagged: "&cYou have been combat-tagged! &7Do not log out for {time}s."
  # Shown when combat tag expires.
  expired: "&aYou are no longer combat-tagged."
  # Action bar format (also set in config.yml).
  action-bar: "&c&l⚔ &eCombat Tag &7- &c{time}s remaining"

# ╔══════════════════════════════════════════════════════════════╗
# ║                   PVP MESSAGES                              ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {killer}    – Killer's name
#   {victim}    – Victim's name
#   {amount}    – Amount lost/dropped
#   {currency}  – Currency display name
#   {symbol}    – Currency symbol

pvp:
  # Shown to the victim when they lose currency.
  victim-loss: "&cYou lost &e{symbol}{amount} {currency} &cto &f{killer}&c!"
  # Shown to the killer when they gain currency.
  killer-gain: "&aYou gained &e{symbol}{amount} {currency} &afrom killing &f{victim}&a!"
  # Broadcast message (for high-value kills).
  broadcast: "&6⚔ &f{killer} &6killed &f{victim} &6and looted &e{symbol}{amount} {currency}&6!"

# ╔══════════════════════════════════════════════════════════════╗
# ║                UPDATE NOTIFICATIONS                         ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {current}  – Current plugin version
#   {latest}   – Latest available version
#   {link}     – Download link

update:
  # Shown to admins on join when an update is available.
  notification: "&6[DZEconomy] &eA new version is available! &7v{current} → v{latest}"
  # Hover/click prompt.
  download: "&7Click here to download: &b{link}"
  # Console log format.
  console: "[DZEconomy] New version available! Current: v{current}, Latest: v{latest}. Download: {link}"
  # Shown when already on the latest version.
  up-to-date: "&aDZEconomy is up to date! &7(v{current})"

# ╔══════════════════════════════════════════════════════════════╗
# ║                  WELCOME MESSAGES                           ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {name}      – Player's name
#   {currency}  – Currency display name
#   {symbol}    – Currency symbol
#   {amount}    – Starting balance amount

welcome:
  # Shown when a player joins for the very first time.
  first-join: "&aWelcome &f{name} &ato the server! You started with &e{symbol}{amount} {currency}&a."
  # Shown when a returning player joins (optional).
  returning: "&aWelcome back, &f{name}&a! Your balances are ready."

# ╔══════════════════════════════════════════════════════════════╗
# ║                     GUI MESSAGES                            ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {currency}  – Currency display name
#   {symbol}    – Currency symbol
#   {amount}    – Balance amount
#   {page}      – Current page number
#   {pages}     – Total pages

gui:
  # Main economy GUI title.
  title: "&6DZEconomy"
  # Balance display item name.
  balance-item: "&a{currency} Balance: &e{symbol}{amount}"
  # Baltop GUI title.
  baltop-title: "&6Top {currency} Balances"
  # Previous page button.
  previous-page: "&a← Previous Page"
  # Next page button.
  next-page: "&aNext Page →"
  # Current page indicator.
  page-indicator: "&7Page {page}/{pages}"
  # Close button.
  close: "&cClose"
  # Back button.
  back: "&a← Back"

# ╔══════════════════════════════════════════════════════════════╗
# ║                  BALTOP FORMATTING                          ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {rank}      – Player's position (1, 2, 3, ...)
#   {name}      – Player's name
#   {amount}    – Formatted balance
#   {currency}  – Currency display name
#   {symbol}    – Currency symbol
#   {page}      – Current page
#   {pages}     – Total pages
#   {command}   – Command used to access baltop
#   {next_page} – Next page number

baltop:
  header: "&8&m────────────────────────────────────&r\n&6&l  Top {currency} Balances\n&8&m────────────────────────────────────&r"
  # Format for top 3 players (special highlighting).
  entry-top: "&6#{rank} &7- &f{name} &8» &e{symbol}{amount}"
  # Format for all other entries.
  entry: "&7#{rank} &8- &7{name} &8» &a{symbol}{amount}"
  # Shown for the player's own ranking (appended at the bottom).
  own-rank: "&7Your rank: &e#{rank} &7with &a{symbol}{amount} {currency}"
  footer: "&8&m────────────────────────────────────&r\n&7Page &f{page}&7/&f{pages} &8| &7Use &f/{command} top {next_page} &7for next page"
  # When no players have balances.
  empty: "&7No balances to display yet."

