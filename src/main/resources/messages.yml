# ╔══════════════════════════════════════════════════════════════╗
# ║                  MOB REWARD MESSAGES                        ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {amount}    – Reward amount
#   {currency}  – Currency display name
#   {mob}       – Mob type name
#   {multiplier} – Active multiplier

mob-rewards:
  # Shown when a player earns a mob reward.
  reward: "&a+{amount} {currency} &7(from killing {mob})"
  # Shown when a multi-kill bonus is applied.
  bonus: "&a+{amount} {currency} &7(multi-kill bonus! x{multiplier})"
  # Shown when a mob is killed in a blacklisted world.
  blacklisted-world: ""
  # Shown when a spawner mob is killed and rewards are disabled.
  spawner-mob: ""

# ╔══════════════════════════════════════════════════════════════╗
# ║                    RANK MESSAGES                            ║
# ╚══════════════════════════════════════════════════════════════╝
# Placeholders:
#   {rank}        – Rank display name
#   {multiplier}  – Rank multiplier
#   {currency}    – Currency display name

rank:
  # Shown when a player's rank multiplier is applied.
  multiplier-applied: "&7Rank bonus: &ax{multiplier} {currency} multiplier (&f{rank}&7)"
  # Shown in balance display for rank info.
  info-line: "&7Rank: &6{rank} &7(&ax{multiplier} multiplier&7)"

# ╔══════════════════════════════════════════════════════════════╗
# ║                  MISC MESSAGES                              ║
# ╚══════════════════════════════════════════════════════════════╝

misc:
  # Shown when data is being saved on shutdown.
  saving: "&7Saving economy data..."
  # Shown when data save is complete.
  saved: "&aEconomy data saved successfully."
  # Shown when a feature is not yet implemented.
  not-implemented: "&cThis feature is not yet implemented."
  # Shown when the plugin is disabled.
  plugin-disabled: "&cDZEconomy is currently disabled."
