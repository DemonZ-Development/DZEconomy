name: Build DZEconomy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Plugin on Ubuntu 24.04
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew shadowJar -x test

      - name: Upload Plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: DZEconomy-2.0.0.jar
          path: build/libs/DZEconomy-2.0.0.jar
          compression-level: 0
          if-no-files-found: error

      - name: Build Summary
        run: |
          echo "DZEconomy v2.0.0 Build Complete!"
          echo "Java: Temurin JDK 21"
          echo "OS: Ubuntu 24.04"
          echo "Artifact: DZEconomy-v2.0.0.jar"
