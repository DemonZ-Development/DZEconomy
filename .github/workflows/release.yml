name: Release DZEconomy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and Test with Gradle
        run: ./gradlew shadowJar

      - name: Rename Output JAR to Match Tag Version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          # Extract version from tag (e.g., v2.0.0 -> 2.0.0)
          VERSION=${TAG_VERSION#v}
          echo "Building DZEconomy version $VERSION matching tag $TAG_VERSION"
          mv build/libs/DZEconomy-2.0.0.jar build/libs/DZEconomy-${VERSION}.jar

      - name: Create GitHub Release and Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/DZEconomy-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
